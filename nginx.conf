events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11;

    lua_shared_dict domain_cache 10m;

    server {
        listen 80;
        server_name _;

        location / {
            
            set $target_backend "";

            rewrite_by_lua_block {
                local host = ngx.var.host
                local cache = ngx.shared.domain_cache
                
                local cached_target = cache:get(host)
                if cached_target then
                    ngx.var.target_backend = cached_target
                    return
                end

                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)
                
                local ok, err = red:connect("redis", 6379)
                if not ok then
                    return ngx.exit(500)
                end

                local res, err = red:get(host)
                
                if not res or res == ngx.null then
                    ngx.status = 404
                    ngx.say("Subdomain not registered.")
                    return ngx.exit(404)
                end

                cache:set(host, res, 30)
                ngx.var.target_backend = res
            }

            proxy_pass http://$target_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            log_by_lua_block {
                local host = ngx.var.host
                ngx.timer.at(0, function()
                    local redis = require "resty.redis"
                    local red = redis:new()
                    red:set_timeout(1000)

                    local ok, err = red:connect("redis", 6379)
                    if not ok then return end

                    local now = ngx.time()
                    local year  = os.date("!%Y", now)
                    local month = os.date("!%m", now)
                    local day   = os.date("!%d", now)
                    local week  = os.date("!%V", now)

                    local daily_key  = host .. ":" .. year .. "-" .. month .. "-" .. day
                    local weekly_key = host .. ":" .. year .. "-W" .. week

                    red:incr(host .. ":total")
                    red:incr(host .. ":" .. year)
                    red:incr(host .. ":" .. year .. "-" .. month)
                    red:incr(weekly_key)
                    red:incr(daily_key)

                    -- TTL: expire daily key at end of day (UTC)
                    local end_of_day = os.time({
                        year = tonumber(year), month = tonumber(month), day = tonumber(day),
                        hour = 23, min = 59, sec = 59
                    })
                    red:expireat(daily_key, end_of_day)

                    -- TTL: expire weekly key at end of week (Sunday 23:59:59 UTC)
                    local wday = tonumber(os.date("!%w", now))  -- 0=Sunday
                    local days_left = (7 - wday) % 7
                    if days_left == 0 then days_left = 7 end
                    red:expireat(weekly_key, end_of_day + days_left * 86400)

                    red:set_keepalive(10000, 100)
                end)
            }
        }
    }
}