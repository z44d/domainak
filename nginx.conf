events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11;
    keepalive_timeout 65;

    lua_shared_dict domain_cache 10m;

    server {
        listen 80;
        server_name _;

        location / {
            
            set $target_backend "";

            rewrite_by_lua_block {
                local host = ngx.var.host
                local cache = ngx.shared.domain_cache
                
                local cached_target = cache:get(host)
                if cached_target then
                    ngx.var.target_backend = cached_target
                    return
                end

                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)
                
                local ok, err = red:connect("redis", 6379)
                if not ok then
                    return ngx.exit(500)
                end

                local banned, banned_err = red:get("banned:" .. host)
                if banned_err then
                    red:set_keepalive(10000, 100)
                    return ngx.exit(500)
                end

                if banned and banned ~= ngx.null then
                    red:set_keepalive(10000, 100)
                    ngx.status = 403
                    ngx.say("Domain is banned.")
                    return ngx.exit(403)
                end

                local res, err = red:get(host)
                
                if not res or res == ngx.null then
                    red:set_keepalive(10000, 100)
                    ngx.status = 404
                    ngx.say("Subdomain not registered.")
                    return ngx.exit(404)
                end

                cache:set(host, res, 30)
                red:set_keepalive(10000, 100)
                ngx.var.target_backend = res
            }

            proxy_pass http://$target_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;


            # TODO
            ##! Important note: visitors analyzing is currently under testing
            log_by_lua_block {
                local host = ngx.var.host
                ngx.timer.at(0, function(premature, tracked_host)
                    if premature or not tracked_host or tracked_host == "" then
                        return
                    end

                    local redis = require "resty.redis"
                    local red = redis:new()
                    red:set_timeout(1000)

                    local ok, err = red:connect("redis", 6379)
                    if not ok then return end

                    local now = ngx.time()
                    local year  = os.date("!%Y", now)
                    local month = os.date("!%m", now)
                    local day   = os.date("!%d", now)
                    local week  = os.date("!%V", now)

                    local total_key = tracked_host .. ":total"
                    local year_key = tracked_host .. ":" .. year
                    local month_key = tracked_host .. ":" .. year .. "-" .. month
                    local weekly_key = tracked_host .. ":" .. year .. "-W" .. week
                    local daily_key = tracked_host .. ":" .. year .. "-" .. month .. "-" .. day

                    local analytics_script = [[
                        for i = 1, #KEYS do
                            redis.call("INCR", KEYS[i])
                            if redis.call("TTL", KEYS[i]) < 0 then
                                redis.call("EXPIRE", KEYS[i], tonumber(ARGV[i]))
                            end
                        end
                        return 1
                    ]]

                    local ok_eval, eval_err = red:eval(
                        analytics_script,
                        5,
                        total_key,
                        year_key,
                        month_key,
                        weekly_key,
                        daily_key,
                        31536000,
                        31536000,
                        7776000,
                        3456000,
                        604800
                    )

                    if not ok_eval then
                        ngx.log(ngx.ERR, "analytics increment failed: ", eval_err)
                    end

                    red:set_keepalive(10000, 100)
                end, host)
            }
        }
    }
}
