services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel run
    depends_on:
      - openresty
    networks:
      - domainak-net

  openresty:
    image: openresty/openresty:alpine
    ports:
      - "2006:80"
    volumes:
      - ./nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      - redis
      - backend
    networks:
      - domainak-net

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    networks:
      - domainak-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "2007:2007"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - DOMAINS=${DOMAINS:-domainak.com}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - domainak-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${BACKEND_URL:-http://localhost:2007/api}
    ports:
      - "5173:5173"
    networks:
      - domainak-net

  test-app:
    image: nginxdemos/hello
    networks:
      - domainak-net

  db:
    image: postgres:alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - domainak-net
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  domainak-net:
    driver: bridge

volumes:
  redis_data:
  pgdata:
