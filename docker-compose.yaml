services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel run
    depends_on:
      - openresty
    networks:
      - domainak-net

  openresty:
    image: openresty/openresty:alpine
    restart: unless-stopped
    ports:
      - "2006:80"
    volumes:
      - ./nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      redis:
        condition: service_started
      domainak:
        condition: service_healthy
      domainak-server:
        condition: service_healthy
    networks:
      - domainak-net

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - domainak-net

  domainak-server:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER:-z44d}/domainak-server:${DOMAINAK_IMAGE_TAG:-latest}
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_URL=${POSTGRES_URL}
      - REDIS_URL=redis://redis:6379
      - DOMAINS=${DOMAINS:-domainak.com}
      - JWT_SECRET=${JWT_SECRET}
      - WEBSITE_URL=${WEBSITE_URL:-http://localhost:5173}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - ADMIN_IDS=${ADMIN_IDS}
      - NODE_ENV=production
      - PORT=2007
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:2007/').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - domainak-net

  domainak:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER:-z44d}/domainak-static:${DOMAINAK_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      domainak-server:
        condition: service_healthy
    networks:
      - domainak-net

  test-app:
    image: nginxdemos/hello
    networks:
      - domainak-net

  db:
    image: postgres:alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - domainak-net
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  domainak-net:
    driver: bridge

volumes:
  redis_data:
  pgdata:
