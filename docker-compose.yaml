services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel run
    depends_on:
      - openresty
    networks:
      - domainak-net

  openresty:
    image: openresty/openresty:alpine
    ports:
      - "2006:80"
    environment:
      - DOMAINS=${DOMAINS}
    volumes:
      - ./nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      - redis
    networks:
      - domainak-net

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    networks:
      - domainak-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=${FRONTEND_URL:-http://frontend:5173}
      - DOMAINS=${DOMAINS:-domainak.com}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    depends_on:
      - db
      - redis
    networks:
      - domainak-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:3000/api}
    depends_on:
      - backend
    networks:
      - domainak-net

  test-app:
    image: nginxdemos/hello
    networks:
      - domainak-net

  db:
    image: postgres:alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - domainak-net
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}

networks:
  domainak-net:
    driver: bridge

volumes:
  redis_data:
  pgdata:
