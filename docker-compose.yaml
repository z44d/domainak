services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel run
    depends_on:
      - openresty
    networks:
      - domainak-net

  openresty:
    image: openresty/openresty:alpine
    ports:
      - "2006:80"
    environment:
      - DOMAINS=${DOMAINS}
    volumes:
      - ./nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      - redis
    networks:
      - domainak-net

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    networks:
      - domainak-net

  test-app:
    image: nginxdemos/hello
    networks:
      - domainak-net

  db:
    image: postgres:alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - domainak-net
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}

networks:
  domainak-net:
    driver: bridge

volumes:
  redis_data:
  pgdata:
